{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header">新規管理者登録</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">ユーザー名 (ID)</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">表示名</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">パスワード</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">担当サイト</label>
                        <select name="site_id" class="form-select">
                            <option value="">(なし)</option>
                            {% for site in sites %}
                            <option value="{{ site.id }}">{{ site.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">管理者を登録</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <h3>管理者一覧</h3>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>名前</th>
                    <th>ユーザー名</th>
                    <th>担当サイト</th>
                    <th>役割</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.site.name if user.site else '未割り当て' }}</td>
                    <td><span class="badge bg-secondary">{{ user.role }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
